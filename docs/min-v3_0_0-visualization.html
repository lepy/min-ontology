<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN — Material · Information · Nexus — Ontologie-Visualisierung v3.0.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
  }

  .header {
    padding: 24px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header h1 {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .header h1 .sep { color: var(--muted); font-weight: 400; }
  .header h1 .mat { color: #f0883e; }
  .header h1 .inf { color: #a371f7; }
  .header h1 .nex { color: #58a6ff; }

  .version-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    padding: 2px 8px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-left: 12px;
    vertical-align: middle;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin: 6px 0 14px;
    line-height: 1.4;
  }

  .tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 8px 18px;
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: 2px solid transparent;
    border-radius: 6px 6px 0 0;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
    letter-spacing: 0.03em;
  }

  .tab-btn.active {
    background: rgba(88, 166, 255, 0.13);
    color: var(--accent);
    border-color: rgba(88, 166, 255, 0.33);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .content {
    padding: 20px 24px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SVG */
  .overview-svg {
    width: 100%;
    max-height: 580px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .svg-node { cursor: pointer; }
  .svg-node:hover rect { filter: brightness(1.2); }

  /* Class cards */
  .class-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 8px;
  }

  .class-card:hover { background: #1c2129; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .class-name {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
  }

  .class-label-de {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .branch-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 9px;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .badge-nexus { background: rgba(88,166,255,0.13); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }
  .badge-forma { background: rgba(210,168,255,0.13); color: #d2a8ff; border: 1px solid rgba(210,168,255,0.2); }
  .badge-root  { background: rgba(139,148,158,0.13); color: #8b949e; border: 1px solid rgba(139,148,158,0.2); }

  .card-details { margin-top: 12px; display: none; }
  .class-card.expanded .card-details { display: block; }

  .card-desc {
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .philosophical-box {
    background: var(--bg);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 10px;
    border-left: 2px solid var(--muted);
  }

  .section-label {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .axiom-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--border);
    color: var(--text);
    border: 1px solid var(--border);
    margin: 2px;
  }

  .axiom-tag.warning {
    background: rgba(218, 54, 51, 0.13);
    color: #ff7b72;
    border-color: rgba(218, 54, 51, 0.33);
  }

  .example-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-family: var(--font-mono);
    margin: 2px;
  }

  /* Relations */
  .ascii-tree {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
    overflow-x: auto;
  }

  .ascii-tree pre {
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.6;
    white-space: pre;
  }

  .group-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .group-toggle-btn {
    width: 100%;
    padding: 12px 16px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .group-toggle-btn:hover { background: #1c2129; }

  .group-content {
    padding: 0 16px 16px;
    display: none;
  }

  .group-toggle.open .group-content { display: block; }

  .prop-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .prop-name {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
  }

  .derived-badge {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    background: rgba(255, 166, 87, 0.13);
    color: #ffa657;
    border: 1px solid rgba(255, 166, 87, 0.27);
  }

  .trait-badge {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    background: rgba(88, 166, 255, 0.13);
    color: #58a6ff;
    border: 1px solid rgba(88, 166, 255, 0.27);
  }

  .prop-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    margin-top: 6px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .prop-meta .label { color: var(--muted); }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(48, 54, 61, 0.13);
  }

  /* Inventory */
  .big-number {
    text-align: center;
    padding: 30px 0 20px;
  }

  .big-number .num {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
  }

  .big-number .label {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    margin-top: 4px;
  }

  .inv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .inv-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .inv-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .inv-card-title {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
  }

  .inv-card-count {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 800;
  }

  .inv-tags {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .inv-tag {
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-top: 12px;
  }

  /* Code blocks */
  .code-toggle-group {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .code-toggle-btn {
    padding: 6px 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
  }

  .code-toggle-btn.active {
    background: rgba(88, 166, 255, 0.13);
    color: var(--accent);
    border-color: rgba(88, 166, 255, 0.33);
  }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
  }

  .code-block pre {
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.6;
    white-space: pre;
  }

  /* Polarity cards */
  .polarity-grid {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .polarity-card {
    flex: 1 1 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }

  /* Detail panel */
  .detail-panel {
    margin-top: 16px;
    background: var(--surface);
    border-radius: 6px;
    padding: 16px;
    display: none;
  }

  .detail-panel.visible { display: block; }

  .close-btn {
    float: right;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 2px 8px;
    font-size: 11px;
    font-family: var(--font-mono);
    cursor: pointer;
  }

  /* Footer */
  .footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    text-align: center;
    background: var(--surface);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>
    MIN <span class="sep">—</span>
    <span class="mat">Material</span>
    <span class="sep">·</span>
    <span class="inf">Information</span>
    <span class="sep">·</span>
    <span class="nex">Nexus</span>
    <span class="version-badge">v3.0.0</span>
  </h1>
  <p class="subtitle">Die Grundontologie. Zwei Wurzeln unter Entity: Nexus (das Aktuale) · Forma (das Formale). 48 Terme.</p>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="0">◉ Übersicht</button>
    <button class="tab-btn" data-tab="1">▣ Klassen</button>
    <button class="tab-btn" data-tab="2">⇄ Relationen</button>
    <button class="tab-btn" data-tab="3">⊕ Polarität</button>
    <button class="tab-btn" data-tab="4">⊞ Datatype &amp; Annotations</button>
    <button class="tab-btn" data-tab="5">∑ Inventar</button>
  </div>
</div>

<div class="content">

function selectSvgNode(id) {
  const cls = CLASSES.find(c => c.id === id);
  if (!cls) return;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  panel.style.borderLeft = `3px solid ${cls.color}44`;
  panel.style.borderColor = cls.color + '44';

  let html = `<button class="close-btn" onclick="document.getElementById('detail-panel').classList.remove('visible')">✕</button>`;
  html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">`;
  html += `<span style="color:${cls.color};font-family:var(--font-mono);font-size:16px;font-weight:700">min:${cls.id}</span>`;
  html += `<span style="color:var(--muted);font-family:var(--font-mono);font-size:12px">${cls.label_de}</span>`;
  html += `</div>`;
  html += `<p style="color:var(--text);font-size:13px;line-height:1.6;margin-bottom:10px">${cls.desc}</p>`;

  if (cls.axioms.length) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;
    cls.axioms.forEach(a => {
      const warn = a.includes('NICHT');
      html += `<span class="axiom-tag ${warn?'warning':''}">${a}</span>`;
    });
    html += `</div>`;
  }

  if (cls.examples.length) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:4px">`;
    cls.examples.forEach(e => {
      html += `<span class="example-tag" style="background:${cls.color}18;color:${cls.color};border:1px solid ${cls.color}33">${e}</span>`;
    });
    html += `</div>`;
  }

  panel.innerHTML = html;

  // Highlight node in SVG
  document.querySelectorAll('.svg-node rect').forEach(r => {
    r.removeAttribute('filter');
    r.setAttribute('stroke-width', '1.2');
  });
  const node = document.querySelector(`.svg-node[data-class="${id}"] rect`);
  if (node) {
    node.setAttribute('filter', 'url(#glow)');
    node.setAttribute('stroke-width', '2');
  }
}

      {id:"constrains",de:"beschränkt",domain:"Forma",range:"Nexus",inv:null,sub:null,chain:null,traits:[]},
      {id:"governs",de:"regiert",domain:"Lex",range:"Process",inv:null,sub:"constrains",chain:null,traits:[]},
      {id:"formalizes",de:"formalisiert",domain:"Structura",range:"Nexus",inv:null,sub:"constrains",chain:null,traits:[]},
      {id:"evaluates",de:"bewertet",domain:"Norma",range:"Nexus",inv:null,sub:"constrains",chain:null,traits:[]},
      {id:"concerns",de:"betrifft",domain:"Possibile",range:"Nexus",inv:null,sub:null,chain:null,traits:[]},
      {id:"alternativeTo",de:"Alternative zu",domain:"Possibile",range:"Nexus",inv:null,sub:"concerns",chain:null,traits:[]},
      {id:"constitutes",de:"konstituiert",domain:"Agent",range:"Institutio",inv:null,sub:null,chain:null,traits:[]},
      {id:"recognizes",de:"erkennt an",domain:"Agent",range:"Institutio",inv:null,sub:null,chain:null,traits:[]},
      {id:"encodes",de:"kodiert",domain:"Data",range:"Forma",inv:"encodedBy",sub:null,chain:null,traits:[]},
      {id:"encodedBy",de:"kodiert durch",domain:"Forma",range:"Data",inv:"encodes",sub:null,chain:null,traits:[]},
    ]
  };

  const colorMap = {};
  CLASSES.forEach(c => colorMap[c.id] = c.color);

  const container = document.getElementById('relation-groups');
  Object.entries(groups).forEach(([name, props]) => {
    const div = document.createElement('div');
    div.className = 'group-toggle';
    let propsHtml = '';
    props.forEach(p => {
      const dc = colorMap[p.domain]||'#58a6ff', rc = colorMap[p.range]||'#58a6ff';
      propsHtml += `<div class="prop-card">`;
      propsHtml += `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">`;
      propsHtml += `<span class="prop-name">min:${p.id}</span>`;
      propsHtml += `<span style="color:var(--muted);font-family:var(--font-mono);font-size:11px">${p.de}</span>`;
      if(p.chain) propsHtml += `<span class="derived-badge">⚡ abgeleitet</span>`;
      p.traits.forEach(t => { propsHtml += `<span class="trait-badge">${t}</span>`; });
      propsHtml += `</div>`;
      propsHtml += `<div class="prop-meta">`;
      propsHtml += `<span><span class="label">Domain:</span> <span style="color:${dc}">${p.domain}</span></span>`;
      propsHtml += `<span style="color:var(--muted)">→</span>`;
      propsHtml += `<span><span class="label">Range:</span> <span style="color:${rc}">${p.range}</span></span>`;
      if(p.inv) propsHtml += `<span><span class="label">↔ Inverse:</span> <span style="color:var(--accent)">${p.inv}</span></span>`;
      if(p.sub) propsHtml += `<span><span class="label">⊂ SubOf:</span> <span style="color:var(--accent)">${p.sub}</span></span>`;
      propsHtml += `</div>`;
      if(p.chain) propsHtml += `<div style="margin-top:4px;font-family:var(--font-mono);font-size:11px"><span style="color:#ffa657">Chain:</span> <span style="color:var(--text)">${p.chain.join(' → ')}</span></div>`;
      propsHtml += `</div>`;
    });
    div.innerHTML = `<button class="group-toggle-btn" onclick="this.parentElement.classList.toggle('open')"><span>${name} <span style="color:var(--muted);font-weight:400;font-size:11px">(${props.length})</span></span><span style="color:var(--muted)">▸</span></button><div class="group-content">${propsHtml}</div>`;
    container.appendChild(div);
  });
})();

// ============ POPULATE POLARITY TAB ============
(function() {
  const el = document.getElementById('panel-3');
  el.innerHTML = `
  <h3 style="font-family:var(--font-mono);font-size:14px;font-weight:600;margin-bottom:8px">Polaritätsmechanismus</h3>
  <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px">
    Polarität deklariert die Natur einer Eigenschaft auf Schema-Ebene, nicht auf Instanz-Ebene.
    Instanzen bleiben flach. Gilt NUR für Nexus. Forma hat keine Polarität.
  </p>
  <div class="polarity-grid">
    <div class="polarity-card" style="border-left:3px solid #f0883e">
      <div style="color:#f0883e;font-family:var(--font-mono);font-size:13px;font-weight:600">min:materialProperty</div>
      <div style="color:var(--muted);font-family:var(--font-mono);font-size:11px;margin-top:2px">materiale Eigenschaft</div>
      <p style="color:var(--text);font-size:12px;line-height:1.5;margin:8px 0">Superproperty für kausal-räumliche Eigenschaften. Aristoteles: Hyle. Spinoza: Attribut der Ausdehnung.</p>
      <code style="color:var(--accent);font-family:var(--font-mono);font-size:11px;background:var(--bg);padding:4px 8px;border-radius:4px;display:block">ex:masse_kg rdfs:subPropertyOf min:materialProperty .</code>
    </div>
    <div class="polarity-card" style="border-left:3px solid #a371f7">
      <div style="color:#a371f7;font-family:var(--font-mono);font-size:13px;font-weight:600">min:informationalProperty</div>
      <div style="color:var(--muted);font-family:var(--font-mono);font-size:11px;margin-top:2px">informationale Eigenschaft</div>
      <p style="color:var(--text);font-size:12px;line-height:1.5;margin:8px 0">Superproperty für strukturell-bestimmte Eigenschaften. Aristoteles: Morphe. Spinoza: Attribut des Denkens.</p>
      <code style="color:var(--accent);font-family:var(--font-mono);font-size:11px;background:var(--bg);padding:4px 8px;border-radius:4px;display:block">ex:werkstoffNr rdfs:subPropertyOf min:informationalProperty .</code>
    </div>
  </div>
  <div class="code-toggle-group">
    <button class="code-toggle-btn active" onclick="showCode(this,'schema')">Schema (Turtle)</button>
    <button class="code-toggle-btn" onclick="showCode(this,'instance')">Instanz (Turtle)</button>
    <button class="code-toggle-btn" onclick="showCode(this,'sparql')">SPARQL</button>
  </div>
  <div class="code-block" id="polarity-code"></div>`;

  const codes = {
    schema: `# === Polaritätsdeklaration auf Schema-Ebene ===

min:materialProperty a rdf:Property ;
    rdfs:label "material property"@en ;
    rdfs:comment "Superproperty für kausal-räumliche Eigenschaften." .

min:informationalProperty a rdf:Property ;
    rdfs:label "informational property"@en ;
    rdfs:comment "Superproperty für strukturell-bestimmte Eigenschaften." .

# Domänenontologie deklariert:
ex:masse_kg a owl:DatatypeProperty ;
    rdfs:subPropertyOf min:materialProperty ;
    rdfs:domain min:Object ;
    rdfs:range xsd:float .

ex:werkstoffNr a owl:DatatypeProperty ;
    rdfs:subPropertyOf min:informationalProperty ;
    rdfs:domain min:Object ;
    rdfs:range xsd:string .`,
    instance: `# === Instanz: Flacher Graph ===

ex:coil_42 a min:Object ;
    ex:masse_kg 2750.0 ;      # ← materialProperty
    ex:werkstoffNr "1.0338" ;  # ← informationalProperty
    min:hasName "Coil 42" ;
    min:hasIdentifier "COIL-2026-042" .

# Kein Blank Node. Kein Zwischenknoten.
# Polarität ist in ex:masse_kg deklariert, nicht in ex:coil_42.`,
    sparql: `# === Alle materialen Eigenschaften eines Objects ===

PREFIX min: <https://w3id.org/min#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?property ?value
WHERE {
  ?property rdfs:subPropertyOf min:materialProperty .
  ex:coil_42 ?property ?value .
}

# === Alle informationalen Eigenschaften ===

SELECT ?property ?value
WHERE {
  ?property rdfs:subPropertyOf min:informationalProperty .
  ex:coil_42 ?property ?value .
}`
  };
  window._polarityCodes = codes;
  document.getElementById('polarity-code').innerHTML = `<pre>${codes.schema}</pre>`;

  window.showCode = function(btn, key) {
    document.querySelectorAll('#panel-3 .code-toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('polarity-code').innerHTML = `<pre>${window._polarityCodes[key]}</pre>`;
  };
})();
