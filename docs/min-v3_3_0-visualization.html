<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN — Material · Information · Nexus — Ontologie-Visualisierung v3.3.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
  }

  .header {
    padding: 24px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header h1 {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .header h1 .sep { color: var(--muted); font-weight: 400; }
  .header h1 .mat { color: #f0883e; }
  .header h1 .inf { color: #a371f7; }
  .header h1 .nex { color: #58a6ff; }

  .version-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    padding: 2px 8px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-left: 12px;
    vertical-align: middle;
  }

  .new-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    color: #3fb950;
    padding: 1px 5px;
    background: rgba(63,185,80,0.13);
    border-radius: 8px;
    border: 1px solid rgba(63,185,80,0.27);
    margin-left: 6px;
    vertical-align: middle;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin: 6px 0 14px;
    line-height: 1.4;
  }

  .tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 8px 18px;
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: 2px solid transparent;
    border-radius: 6px 6px 0 0;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
    letter-spacing: 0.03em;
  }

  .tab-btn.active {
    background: rgba(88, 166, 255, 0.13);
    color: var(--accent);
    border-color: rgba(88, 166, 255, 0.33);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .content {
    padding: 20px 24px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SVG */
  .overview-svg {
    width: 100%;
    max-height: 640px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .svg-node { cursor: pointer; }
  .svg-node:hover rect { filter: brightness(1.2); }

  /* Class cards */
  .class-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 8px;
  }

  .class-card:hover { background: #1c2129; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .class-name {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
  }

  .class-label-de {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .branch-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 9px;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .badge-nexus { background: rgba(88,166,255,0.13); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }
  .badge-forma { background: rgba(210,168,255,0.13); color: #d2a8ff; border: 1px solid rgba(210,168,255,0.2); }
  .badge-root  { background: rgba(139,148,158,0.13); color: #8b949e; border: 1px solid rgba(139,148,158,0.2); }

  .card-details { margin-top: 12px; display: none; }
  .class-card.expanded .card-details { display: block; }

  .card-desc {
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .philosophical-box {
    background: var(--bg);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 10px;
    border-left: 2px solid var(--muted);
  }

  .section-label {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .axiom-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--border);
    color: var(--text);
    border: 1px solid var(--border);
    margin: 2px;
  }

  .axiom-tag.warning {
    background: rgba(218, 54, 51, 0.13);
    color: #ff7b72;
    border-color: rgba(218, 54, 51, 0.33);
  }

  .axiom-tag.info {
    background: rgba(88, 166, 255, 0.13);
    color: #58a6ff;
    border-color: rgba(88, 166, 255, 0.33);
  }

  .example-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-family: var(--font-mono);
    margin: 2px;
  }

  /* Relations */
  .ascii-tree {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
    overflow-x: auto;
  }

  .ascii-tree pre {
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.6;
    white-space: pre;
  }

  .group-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .group-toggle-btn {
    width: 100%;
    padding: 12px 16px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .group-toggle-btn:hover { background: #1c2129; }

  .group-content {
    padding: 0 16px 16px;
    display: none;
  }

  .group-toggle.open .group-content { display: block; }

  .prop-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .prop-name {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
  }

  .derived-badge {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    background: rgba(255, 166, 87, 0.13);
    color: #ffa657;
    border: 1px solid rgba(255, 166, 87, 0.27);
  }

  .trait-badge {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    background: rgba(88, 166, 255, 0.13);
    color: #58a6ff;
    border: 1px solid rgba(88, 166, 255, 0.27);
  }

  .identity-badge {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    background: rgba(218, 54, 51, 0.13);
    color: #ff7b72;
    border: 1px solid rgba(218, 54, 51, 0.27);
  }

  .conserve-badge {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    background: rgba(63, 185, 80, 0.13);
    color: #3fb950;
    border: 1px solid rgba(63, 185, 80, 0.27);
  }

  .prop-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    margin-top: 6px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .prop-meta .label { color: var(--muted); }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(48, 54, 61, 0.13);
  }

  /* Inventory */
  .big-number {
    text-align: center;
    padding: 30px 0 20px;
  }

  .big-number .num {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
  }

  .big-number .label {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    margin-top: 4px;
  }

  .inv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .inv-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .inv-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .inv-card-title {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
  }

  .inv-card-count {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 800;
  }

  .inv-tags {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .inv-tag {
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-top: 12px;
  }

  /* Code blocks */
  .code-toggle-group {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .code-toggle-btn {
    padding: 6px 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
  }

  .code-toggle-btn.active {
    background: rgba(88, 166, 255, 0.13);
    color: var(--accent);
    border-color: rgba(88, 166, 255, 0.33);
  }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
  }

  .code-block pre {
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.6;
    white-space: pre;
  }

  /* Polarity cards */
  .polarity-grid {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .polarity-card {
    flex: 1 1 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }

  /* Detail panel */
  .detail-panel {
    margin-top: 16px;
    background: var(--surface);
    border-radius: 6px;
    padding: 16px;
    display: none;
  }

  .detail-panel.visible { display: block; }

  .close-btn {
    float: right;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 2px 8px;
    font-size: 11px;
    font-family: var(--font-mono);
    cursor: pointer;
  }

  /* Meta dimension cards */
  .meta-dim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .meta-dim-title {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
  }

  .meta-prop-inline {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
    margin: 2px;
    background: rgba(126,231,135,0.1);
    color: #7ee787;
    border: 1px solid rgba(126,231,135,0.2);
  }

  /* Footer */
  .footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    text-align: center;
    background: var(--surface);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>
    MIN <span class="sep">—</span>
    <span class="mat">Material</span>
    <span class="sep">·</span>
    <span class="inf">Information</span>
    <span class="sep">·</span>
    <span class="nex">Nexus</span>
    <span class="version-badge">v3.3.0</span>
  </h1>
  <p class="subtitle">Die Grundontologie. Zwei Zweige unter Entity: Nexus (5 Kategorien) · Forma (6 Kategorien). 69 Terme. Neu: Boundary, Typus, Metavokabular.</p>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="0">◉ Übersicht</button>
    <button class="tab-btn" data-tab="1">▣ Klassen</button>
    <button class="tab-btn" data-tab="2">⇄ Relationen</button>
    <button class="tab-btn" data-tab="3">⊕ Polarität</button>
    <button class="tab-btn" data-tab="4">⊞ Datatype &amp; Annotations</button>
    <button class="tab-btn" data-tab="5">✦ Metavokabular</button>
    <button class="tab-btn" data-tab="6">∑ Inventar</button>
  </div>
</div>

<div class="content">
