<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIN v2.1.0 — Material · Information · Nexus</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useMemo } = React;

    const COLORS = {
      nexus: "#1a1a2e",
      object: "#e07a5f",
      process: "#3d85c6",
      data: "#81b29a",
      agent: "#f2cc8f",
      material: "#c44536",
      informational: "#2a6f97",
      relation: "#6c757d",
      bg: "#0d1117",
      surface: "#161b22",
      surfaceHover: "#1c2128",
      border: "#30363d",
      text: "#e6edf3",
      textMuted: "#8b949e",
      accent: "#58a6ff",
    };

    const CLASSES = [
      {
        id: "nexus", label: "Nexus", color: COLORS.nexus, x: 400, y: 90,
        de: "Wurzelklasse", desc: "Gemeinsame Superklasse. Scoping für Properties und Queries. Nicht direkt instantiiert.",
        axioms: ["Domain/Range für geteilte Properties", "Query-Anker: ?x a min:Nexus"]
      },
      {
        id: "object", label: "Object", color: COLORS.object, x: 180, y: 250,
        de: "Das, was IST", desc: "Material-dominanter Nexus. Zeigt sich primär als physisches, räumlich ausgedehntes, kausal wirksames Etwas.",
        axioms: ["Identitätskriterium: materiale Kontinuität", "Disjunkt mit Process, Data"],
        examples: "Coil, Bauteil, Werkzeug, Sensor, Recyclat, Vakuum, EM-Feld, Schatten"
      },
      {
        id: "process", label: "Process", color: COLORS.process, x: 400, y: 250,
        de: "Das, was GESCHIEHT", desc: "Ausgewogener Nexus. Material: Kräfte, Energie. Informational: Regeln, Parameter. Transformation.",
        axioms: ["∃ hasInput Object", "∃ hasOutput Object", "Disjunkt mit Object, Data"],
        examples: "Umformen, Zugversuch, Simulation, Recycling, Schall"
      },
      {
        id: "data", label: "Data", color: COLORS.data, x: 620, y: 250,
        de: "Das, was BESCHREIBT", desc: "Informational-dominanter Nexus. Existenzberechtigung liegt in der Semantik, nicht in den Bytes.",
        axioms: ["Identitätskriterium: informationale Kontinuität", "Disjunkt mit Object, Process"],
        examples: "Messdaten, Simulationsergebnis, Produktpass, Zertifikat, Fehlerbericht"
      },
      {
        id: "agent", label: "Agent", color: COLORS.agent, x: 400, y: 410,
        de: "Das, was HANDELT", desc: "Handlungsfähiger Nexus. Kausale Wirksamkeit + Selektivität + Zurechenbarkeit. Intentionalität NICHT gefordert.",
        axioms: ["∃ performs Process", "NICHT disjunkt — kann zugleich Object sein", "Latour: Aktant"],
        examples: "Mensch, CNC-Maschine, Roboter, ML-Modell, Schatten, Korrosion, Tornado"
      },
    ];

    const RELATIONS = [
      { from: "process", to: "object", label: "hasInput", color: COLORS.object, group: "transformation", inverse: "undergoes" },
      { from: "process", to: "object", label: "hasOutput", color: COLORS.object, group: "transformation", inverse: "resultOf", offset: 20 },
      { from: "agent", to: "process", label: "performs", color: COLORS.agent, group: "agency", inverse: "performedBy" },
      { from: "agent", to: "process", label: "controls", color: COLORS.agent, group: "agency", note: "subPropertyOf performs", dashed: true },
      { from: "agent", to: "object", label: "actsOn", color: COLORS.agent, group: "wirkung", inverse: "affectedBy", note: "Chain: performs → hasInput" },
      { from: "agent", to: "object", label: "owns", color: COLORS.agent, group: "wirkung", offset: -20 },
      { from: "agent", to: "object", label: "produces", color: COLORS.agent, group: "wirkung", note: "Chain: performs → hasOutput", dashed: true },
      { from: "data", to: "nexus", label: "describes", color: COLORS.data, group: "data", inverse: "describedBy" },
      { from: "process", to: "data", label: "generates", color: COLORS.data, group: "data", inverse: "generatedBy" },
      { from: "nexus", to: "nexus", label: "nexusWith", color: COLORS.textMuted, group: "inter", note: "Symmetric", self: true },
      { from: "nexus", to: "nexus", label: "hasComponent", color: COLORS.textMuted, group: "inter", note: "Transitive, subPropertyOf nexusWith", self: true },
    ];

    const DATATYPE_PROPS = [
      { name: "hasIdentifier", range: "xsd:string" },
      { name: "hasName", range: "xsd:string" },
      { name: "hasTimestamp", range: "xsd:dateTime" },
      { name: "hasDescription", range: "xsd:string" },
      { name: "hasStatus", range: "xsd:string" },
    ];

    const ANNOTATIONS = [
      { name: "designRationale", desc: "Begründung einer Designentscheidung" },
      { name: "philosophicalBasis", desc: "Philosophische Fundierung" },
    ];

    const POLARITY_EXAMPLES = {
      material: [
        { prop: "ex:masse_kg", on: "Object", desc: "Masse in Kilogramm" },
        { prop: "ex:druck_Pa", on: "Object", desc: "Druck in Pascal" },
        { prop: "ex:pressenkraft_kN", on: "Process", desc: "Kraft beim Umformen" },
        { prop: "ex:flaeche_m2", on: "Object", desc: "Fläche in Quadratmeter" },
        { prop: "ex:bytes", on: "Data", desc: "Speichergröße" },
      ],
      informational: [
        { prop: "ex:werkstoffNr", on: "Object", desc: "Werkstoffnummer" },
        { prop: "ex:gefuege", on: "Object", desc: "Gefügetyp" },
        { prop: "ex:methode", on: "Process", desc: "Verfahrensbezeichnung" },
        { prop: "ex:schema", on: "Data", desc: "Datenformat/Schema" },
        { prop: "ex:konfiguration", on: "Agent", desc: "Agenten-Setup" },
      ],
    };

    const TABS = [
      { id: "overview", label: "Übersicht" },
      { id: "classes", label: "Klassen" },
      { id: "relations", label: "Relationen" },
      { id: "polarity", label: "Polarität" },
      { id: "datatype", label: "Datatype & Annotations" },
      { id: "inventory", label: "Inventar" },
    ];

    const GROUPS = {
      transformation: { label: "Transformation (Process ↔ Object)", color: COLORS.object },
      agency: { label: "Agency (Agent → Process)", color: COLORS.agent },
      wirkung: { label: "Wirkung (Agent → Object)", color: COLORS.agent },
      data: { label: "Data-Relationen", color: COLORS.data },
      inter: { label: "Inter-Nexus", color: COLORS.textMuted },
    };

    function ClassNode({ cls, selected, onClick, scale = 1 }) {
      const isSelected = selected === cls.id;
      const w = 120 * scale, h = 54 * scale;
      return (
        <g onClick={() => onClick(cls.id)} style={{ cursor: "pointer" }}>
          <rect
            x={cls.x - w / 2} y={cls.y - h / 2}
            width={w} height={h} rx={8 * scale}
            fill={isSelected ? cls.color : cls.color + "cc"}
            stroke={isSelected ? "#fff" : cls.color}
            strokeWidth={isSelected ? 2.5 : 1.5}
            filter={isSelected ? "url(#glow)" : undefined}
          />
          <text x={cls.x} y={cls.y - 4 * scale} textAnchor="middle"
            fill="#fff" fontSize={14 * scale} fontWeight="700" fontFamily="'JetBrains Mono', monospace">
            {cls.label}
          </text>
          <text x={cls.x} y={cls.y + 14 * scale} textAnchor="middle"
            fill="#ffffffaa" fontSize={9.5 * scale} fontFamily="'JetBrains Mono', monospace">
            {cls.de}
          </text>
        </g>
      );
    }

    function SubclassArrow({ from, to, scale = 1 }) {
      const fc = CLASSES.find(c => c.id === from);
      const tc = CLASSES.find(c => c.id === to);
      if (!fc || !tc) return null;
      const dy = tc.y - fc.y;
      const dx = tc.x - fc.x;
      const angle = Math.atan2(dy, dx);
      const startX = fc.x + Math.cos(angle) * 27 * scale;
      const startY = fc.y + Math.sin(angle) * 27 * scale;
      const endX = tc.x - Math.cos(angle) * 60 * scale;
      const endY = tc.y - Math.sin(angle) * 27 * scale;
      return (
        <line x1={startX} y1={startY} x2={endX} y2={endY}
          stroke={COLORS.textMuted + "88"} strokeWidth={1.5} strokeDasharray="6,4"
          markerEnd="url(#arrowSub)" />
      );
    }

    function OverviewDiagram({ selected, onSelect }) {
      return (
        <svg viewBox="0 0 800 500" style={{ width: "100%", maxHeight: 420, display: "block" }}>
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="g" />
              <feMerge><feMergeNode in="g" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
            <marker id="arrowSub" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10" fill="none" stroke={COLORS.textMuted + "88"} strokeWidth="1.5" />
            </marker>
          </defs>

          {/* Disjunction arc */}
          <path d={`M ${180} ${280} Q ${400} ${320} ${620} ${280}`}
            fill="none" stroke="#ff6b6b44" strokeWidth="1" strokeDasharray="4,3" />
          <text x="400" y="312" textAnchor="middle" fill="#ff6b6b88" fontSize="9" fontFamily="monospace">
            owl:AllDisjointClasses
          </text>

          {/* Agent non-disjunction note */}
          <text x="400" y="460" textAnchor="middle" fill={COLORS.agent + "88"} fontSize="9" fontFamily="monospace">
            ⟂ NICHT disjunkt — kann zugleich Object sein
          </text>

          {/* Subclass arrows */}
          <SubclassArrow from="nexus" to="object" />
          <SubclassArrow from="nexus" to="process" />
          <SubclassArrow from="nexus" to="data" />
          <SubclassArrow from="nexus" to="agent" />

          {/* rdfs:subClassOf label */}
          <text x="268" y="162" textAnchor="middle" fill={COLORS.textMuted + "66"} fontSize="8" fontFamily="monospace" transform="rotate(-35, 268, 162)">
            rdfs:subClassOf
          </text>

          {/* Polarity indicators */}
          <rect x="20" y="20" width="12" height="12" rx="2" fill={COLORS.material} />
          <text x="38" y="30" fill={COLORS.material} fontSize="10" fontFamily="monospace">materialProperty</text>
          <rect x="20" y="40" width="12" height="12" rx="2" fill={COLORS.informational} />
          <text x="38" y="50" fill={COLORS.informational} fontSize="10" fontFamily="monospace">informationalProperty</text>

          {/* Key relations as thin arrows */}
          {/* performs */}
          <line x1="380" y1="390" x2="380" y2="280" stroke={COLORS.agent + "66"} strokeWidth="1" markerEnd="url(#arrowSub)" />
          <text x="365" y="340" fill={COLORS.agent + "99"} fontSize="8" fontFamily="monospace" textAnchor="end">performs</text>

          {/* hasInput */}
          <line x1="340" y1="250" x2="240" y2="250" stroke={COLORS.object + "66"} strokeWidth="1" markerEnd="url(#arrowSub)" />
          <text x="290" y="243" fill={COLORS.object + "99"} fontSize="8" fontFamily="monospace" textAnchor="middle">hasInput</text>

          {/* hasOutput */}
          <line x1="340" y1="265" x2="240" y2="265" stroke={COLORS.object + "66"} strokeWidth="1" markerEnd="url(#arrowSub)" />
          <text x="290" y="278" fill={COLORS.object + "99"} fontSize="8" fontFamily="monospace" textAnchor="middle">hasOutput</text>

          {/* generates */}
          <line x1="460" y1="250" x2="560" y2="250" stroke={COLORS.data + "66"} strokeWidth="1" markerEnd="url(#arrowSub)" />
          <text x="510" y="243" fill={COLORS.data + "99"} fontSize="8" fontFamily="monospace" textAnchor="middle">generates</text>

          {/* describes */}
          <line x1="620" y1="220" x2="440" y2="115" stroke={COLORS.data + "44"} strokeWidth="1" strokeDasharray="4,3" markerEnd="url(#arrowSub)" />
          <text x="545" y="160" fill={COLORS.data + "77"} fontSize="8" fontFamily="monospace" textAnchor="middle" transform="rotate(-30, 545, 160)">describes → Nexus</text>

          {/* actsOn */}
          <line x1="350" y1="400" x2="210" y2="280" stroke={COLORS.agent + "44"} strokeWidth="1" strokeDasharray="4,3" markerEnd="url(#arrowSub)" />
          <text x="260" y="350" fill={COLORS.agent + "77"} fontSize="8" fontFamily="monospace" textAnchor="middle" transform="rotate(-42, 260, 350)">actsOn (chain)</text>

          {/* Class nodes on top */}
          {CLASSES.map(cls => (
            <ClassNode key={cls.id} cls={cls} selected={selected} onClick={onSelect} />
          ))}
        </svg>
      );
    }

    function ClassDetail({ cls }) {
      if (!cls) return (
        <div style={{ padding: 20, color: COLORS.textMuted, fontStyle: "italic", textAlign: "center" }}>
          Klasse anklicken für Details
        </div>
      );
      return (
        <div style={{ padding: "16px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: cls.color }} />
            <span style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, fontFamily: "'JetBrains Mono', monospace" }}>
              min:{cls.label}
            </span>
            <span style={{ color: COLORS.textMuted, fontSize: 13 }}>— {cls.de}</span>
          </div>
          <p style={{ color: COLORS.text, fontSize: 13, lineHeight: 1.6, margin: "0 0 12px" }}>{cls.desc}</p>
          {cls.axioms && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ color: COLORS.textMuted, fontSize: 11, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>Axiome</div>
              {cls.axioms.map((a, i) => (
                <div key={i} style={{ color: COLORS.accent, fontSize: 12, fontFamily: "monospace", padding: "2px 0" }}>→ {a}</div>
              ))}
            </div>
          )}
          {cls.examples && (
            <div>
              <div style={{ color: COLORS.textMuted, fontSize: 11, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>Beispiele</div>
              <div style={{ color: COLORS.text, fontSize: 12, fontStyle: "italic" }}>{cls.examples}</div>
            </div>
          )}
        </div>
      );
    }

    function RelationsView() {
      const [activeGroup, setActiveGroup] = useState(null);
      const groups = useMemo(() => {
        const g = {};
        RELATIONS.forEach(r => {
          if (!g[r.group]) g[r.group] = [];
          g[r.group].push(r);
        });
        return g;
      }, []);

      return (
        <div style={{ padding: "16px 20px" }}>
          <div style={{ color: COLORS.textMuted, fontSize: 12, marginBottom: 16 }}>
            15 ObjectProperties in 5 Gruppen. Klicke auf eine Gruppe.
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
            {Object.entries(GROUPS).map(([key, g]) => (
              <button key={key} onClick={() => setActiveGroup(activeGroup === key ? null : key)}
                style={{
                  background: activeGroup === key ? g.color + "33" : COLORS.surface,
                  border: `1px solid ${activeGroup === key ? g.color : COLORS.border}`,
                  color: activeGroup === key ? g.color : COLORS.textMuted,
                  padding: "6px 12px", borderRadius: 6, cursor: "pointer", fontSize: 12,
                  fontFamily: "'JetBrains Mono', monospace", transition: "all 0.2s"
                }}>
                {g.label}
              </button>
            ))}
          </div>
          {activeGroup && groups[activeGroup] && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {groups[activeGroup].map((r, i) => (
                <div key={i} style={{
                  background: COLORS.surface, border: `1px solid ${COLORS.border}`,
                  borderRadius: 8, padding: "12px 16px", borderLeft: `3px solid ${r.color}`
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <code style={{ color: COLORS.accent, fontSize: 13 }}>min:{r.label}</code>
                    <span style={{ color: COLORS.textMuted, fontSize: 11 }}>
                      {r.from} → {r.to}
                    </span>
                    {r.dashed && <span style={{ color: COLORS.textMuted, fontSize: 10, background: COLORS.border, padding: "1px 6px", borderRadius: 3 }}>abgeleitet</span>}
                  </div>
                  <div style={{ display: "flex", gap: 16, marginTop: 6, flexWrap: "wrap" }}>
                    {r.inverse && <span style={{ color: COLORS.textMuted, fontSize: 11 }}>↔ inverse: <code style={{ color: COLORS.text }}>{r.inverse}</code></span>}
                    {r.note && <span style={{ color: COLORS.textMuted, fontSize: 11, fontStyle: "italic" }}>{r.note}</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
          {!activeGroup && (
            <div style={{ background: COLORS.surface, borderRadius: 8, padding: 16, border: `1px solid ${COLORS.border}` }}>
              <pre style={{ color: COLORS.text, fontSize: 11, fontFamily: "monospace", margin: 0, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>
{`           Agent
          ╱  │  ╲
   actsOn│  │performs    controls ⊂ performs
         │  │  │
         ▼  │  ▼
      Object│ Process ──generates──▶ Data
         ▲  │  │  ▲                   │
resultOf │  │  │  │ undergoes    describes
         │  ▼  ▼  │                   │
         hasOutput │                  ▼
         hasInput──┘                Nexus`}
              </pre>
            </div>
          )}
        </div>
      );
    }

    function PolarityView() {
      const [pole, setPole] = useState("material");
      return (
        <div style={{ padding: "16px 20px" }}>
          <div style={{ color: COLORS.textMuted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
            Polarität lebt auf Schema-Ebene. Properties deklarieren ihre Natur durch
            <code style={{ color: COLORS.accent }}> rdfs:subPropertyOf</code>.
            Instanzen bleiben flach — kein Blank Node, kein Zwischenknoten.
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            {["material", "informational"].map(p => (
              <button key={p} onClick={() => setPole(p)}
                style={{
                  flex: 1, padding: "10px 16px", borderRadius: 8, cursor: "pointer",
                  background: pole === p ? (p === "material" ? COLORS.material + "22" : COLORS.informational + "22") : COLORS.surface,
                  border: `1.5px solid ${pole === p ? (p === "material" ? COLORS.material : COLORS.informational) : COLORS.border}`,
                  color: pole === p ? (p === "material" ? COLORS.material : COLORS.informational) : COLORS.textMuted,
                  fontSize: 13, fontFamily: "'JetBrains Mono', monospace", transition: "all 0.2s"
                }}>
                min:{p}Property
                <div style={{ fontSize: 10, marginTop: 4, fontFamily: "sans-serif", opacity: 0.7 }}>
                  {p === "material" ? "kausal · raumzeitlich · physisch" : "strukturell · bestimmt · erkennbar"}
                </div>
              </button>
            ))}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {POLARITY_EXAMPLES[pole].map((ex, i) => (
              <div key={i} style={{
                background: COLORS.surface, border: `1px solid ${COLORS.border}`,
                borderRadius: 6, padding: "8px 14px", display: "flex", alignItems: "center", gap: 12,
                borderLeft: `3px solid ${pole === "material" ? COLORS.material : COLORS.informational}`
              }}>
                <code style={{ color: COLORS.accent, fontSize: 12, minWidth: 160 }}>{ex.prop}</code>
                <span style={{ color: COLORS.textMuted, fontSize: 11, minWidth: 60 }}>on {ex.on}</span>
                <span style={{ color: COLORS.text, fontSize: 12 }}>{ex.desc}</span>
              </div>
            ))}
          </div>

          <div style={{
            background: COLORS.surface, borderRadius: 8, padding: 14,
            border: `1px solid ${COLORS.border}`, marginTop: 16
          }}>
            <div style={{ color: COLORS.textMuted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
              Schema-Deklaration (einmal)
            </div>
            <pre style={{ color: COLORS.text, fontSize: 11, fontFamily: "monospace", margin: 0, lineHeight: 1.6 }}>
{pole === "material"
  ? `ex:masse_kg  a owl:DatatypeProperty ;
    rdfs:subPropertyOf  min:materialProperty ;
    rdfs:domain         min:Object ;
    rdfs:range          xsd:float .`
  : `ex:werkstoffNr  a owl:DatatypeProperty ;
    rdfs:subPropertyOf  min:informationalProperty ;
    rdfs:domain         min:Object ;
    rdfs:range          xsd:string .`}
            </pre>
            <div style={{ color: COLORS.textMuted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, marginTop: 14 }}>
              Instanz (flach)
            </div>
            <pre style={{ color: COLORS.text, fontSize: 11, fontFamily: "monospace", margin: 0, lineHeight: 1.6 }}>
{pole === "material"
  ? `ex:Coil_042  ex:masse_kg  12500.0 .`
  : `ex:Coil_042  ex:werkstoffNr  "1.0548" .`}
            </pre>
            <div style={{ color: COLORS.textMuted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, marginTop: 14 }}>
              SPARQL
            </div>
            <pre style={{ color: COLORS.text, fontSize: 11, fontFamily: "monospace", margin: 0, lineHeight: 1.6 }}>
{pole === "material"
  ? `SELECT ?prop ?val WHERE {
  ex:Coil_042 ?prop ?val .
  ?prop rdfs:subPropertyOf* min:materialProperty .
}`
  : `SELECT ?prop ?val WHERE {
  ex:Coil_042 ?prop ?val .
  ?prop rdfs:subPropertyOf* min:informationalProperty .
}`}
            </pre>
          </div>
        </div>
      );
    }

    function DatatypeView() {
      return (
        <div style={{ padding: "16px 20px" }}>
          <div style={{ color: COLORS.textMuted, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
            5 Datatype Properties — Domain: min:Nexus
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 24 }}>
            {DATATYPE_PROPS.map((p, i) => (
              <div key={i} style={{
                background: COLORS.surface, border: `1px solid ${COLORS.border}`,
                borderRadius: 6, padding: "8px 14px", display: "flex", alignItems: "center", gap: 12
              }}>
                <code style={{ color: COLORS.accent, fontSize: 13, minWidth: 150 }}>min:{p.name}</code>
                <span style={{ color: COLORS.textMuted, fontSize: 12 }}>→ {p.range}</span>
              </div>
            ))}
          </div>

          <div style={{ color: COLORS.textMuted, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
            2 Annotation Properties
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {ANNOTATIONS.map((a, i) => (
              <div key={i} style={{
                background: COLORS.surface, border: `1px solid ${COLORS.border}`,
                borderRadius: 6, padding: "8px 14px", display: "flex", alignItems: "center", gap: 12
              }}>
                <code style={{ color: "#d2a8ff", fontSize: 13, minWidth: 180 }}>min:{a.name}</code>
                <span style={{ color: COLORS.text, fontSize: 12 }}>{a.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function InventoryView() {
      const items = [
        { cat: "Klassen", count: 5, items: "Nexus, Object, Process, Data, Agent", color: COLORS.accent },
        { cat: "Polaritäts-Properties", count: 2, items: "materialProperty, informationalProperty", color: COLORS.material },
        { cat: "Inter-Nexus", count: 2, items: "nexusWith (sym), hasComponent (trans)", color: COLORS.textMuted },
        { cat: "Kategorienrelationen", count: 13, items: "hasInput, hasOutput, undergoes, resultOf, performs, performedBy, controls, actsOn, affectedBy, owns, describes, describedBy, generates, generatedBy, produces", color: COLORS.data },
        { cat: "Datatype Properties", count: 5, items: "hasIdentifier, hasName, hasTimestamp, hasDescription, hasStatus", color: COLORS.object },
        { cat: "Annotations", count: 2, items: "designRationale, philosophicalBasis", color: "#d2a8ff" },
      ];
      const total = items.reduce((s, i) => s + i.count, 0);

      return (
        <div style={{ padding: "16px 20px" }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 40, fontWeight: 800, color: COLORS.text, fontFamily: "'JetBrains Mono', monospace" }}>{total}</div>
            <div style={{ color: COLORS.textMuted, fontSize: 12 }}>Terme in MIN v2.1.0</div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {items.map((item, i) => (
              <div key={i} style={{
                background: COLORS.surface, border: `1px solid ${COLORS.border}`,
                borderRadius: 8, padding: "12px 16px", borderLeft: `3px solid ${item.color}`
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ color: COLORS.text, fontSize: 13, fontWeight: 600 }}>{item.cat}</span>
                  <span style={{ color: item.color, fontSize: 18, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>{item.count}</span>
                </div>
                <div style={{ color: COLORS.textMuted, fontSize: 11, fontFamily: "monospace", lineHeight: 1.5 }}>{item.items}</div>
              </div>
            ))}
          </div>

          <div style={{
            background: COLORS.surface, borderRadius: 8, padding: 14,
            border: `1px solid ${COLORS.border}`, marginTop: 20, textAlign: "center"
          }}>
            <div style={{ color: COLORS.textMuted, fontSize: 11, marginBottom: 6 }}>Vergleich</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 40 }}>
              <div>
                <div style={{ color: COLORS.accent, fontSize: 24, fontWeight: 800, fontFamily: "monospace" }}>29</div>
                <div style={{ color: COLORS.textMuted, fontSize: 11 }}>MIN v2.1.0</div>
              </div>
              <div>
                <div style={{ color: "#ff6b6b", fontSize: 24, fontWeight: 800, fontFamily: "monospace" }}>~180</div>
                <div style={{ color: COLORS.textMuted, fontSize: 11 }}>BFO + IAO + OBI + RO</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MINVisualization() {
      const [tab, setTab] = useState("overview");
      const [selectedClass, setSelectedClass] = useState(null);

      const handleClassSelect = useCallback((id) => {
        setSelectedClass(prev => prev === id ? null : id);
      }, []);

      const selectedCls = CLASSES.find(c => c.id === selectedClass);

      return (
        <div style={{
          background: COLORS.bg, color: COLORS.text, minHeight: "100vh",
          fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        }}>
          {/* Header */}
          <div style={{
            padding: "20px 24px 16px", borderBottom: `1px solid ${COLORS.border}`,
            display: "flex", alignItems: "baseline", gap: 12
          }}>
            <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", letterSpacing: -0.5 }}>
              <span style={{ color: COLORS.material }}>M</span>
              <span style={{ color: COLORS.textMuted }}>·</span>
              <span style={{ color: COLORS.informational }}>I</span>
              <span style={{ color: COLORS.textMuted }}>·</span>
              <span style={{ color: COLORS.text }}>N</span>
            </span>
            <span style={{ color: COLORS.textMuted, fontSize: 13 }}>v2.1.0</span>
            <span style={{ color: COLORS.textMuted, fontSize: 11, marginLeft: "auto" }}>Material · Information · Nexus</span>
          </div>

          {/* Tabs */}
          <div style={{
            display: "flex", gap: 0, borderBottom: `1px solid ${COLORS.border}`,
            overflowX: "auto", WebkitOverflowScrolling: "touch"
          }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{
                  padding: "10px 16px", background: "none", border: "none",
                  borderBottom: tab === t.id ? `2px solid ${COLORS.accent}` : "2px solid transparent",
                  color: tab === t.id ? COLORS.accent : COLORS.textMuted,
                  fontSize: 12, cursor: "pointer", whiteSpace: "nowrap",
                  fontFamily: "'JetBrains Mono', monospace", transition: "all 0.15s"
                }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ maxWidth: 860, margin: "0 auto" }}>
            {tab === "overview" && (
              <div>
                <OverviewDiagram selected={selectedClass} onSelect={handleClassSelect} />
                <div style={{ borderTop: `1px solid ${COLORS.border}` }}>
                  <ClassDetail cls={selectedCls} />
                </div>
              </div>
            )}

            {tab === "classes" && (
              <div style={{ padding: "16px 20px" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {CLASSES.map(cls => (
                    <div key={cls.id} style={{
                      background: COLORS.surface, border: `1px solid ${COLORS.border}`,
                      borderRadius: 10, overflow: "hidden", borderLeft: `4px solid ${cls.color}`
                    }}>
                      <ClassDetail cls={cls} />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === "relations" && <RelationsView />}
            {tab === "polarity" && <PolarityView />}
            {tab === "datatype" && <DatatypeView />}
            {tab === "inventory" && <InventoryView />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MINVisualization />);
  </script>
</body>
</html>
